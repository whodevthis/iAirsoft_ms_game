spring.application.name=msGame
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/msgame?useSSL=false&serverTimezone=UTC
spring.datasource.username=ms_game
spring.datasource.password=ms_game_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=myuser
spring.rabbitmq.password=secret
app.rabbitmq.exchange=auth.exchange
app.rabbitmq.queue=player.creation.queue
app.rabbitmq.routing-key=auth.createUser

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true